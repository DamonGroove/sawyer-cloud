name: Base image build

# Triggered on main whenever anything that bakes into the base image changes.
# Other branches do not build the base image — PR CI just validates.
on:
  push:
    branches: [main]
    paths:
      - scripts/Dockerfile.base
      - scripts/build-base-image.sh
      - scripts/bootstrap.sh
      - scripts/apply-smb.py
      - 'customization/community-containers/**'
      - 'customization/apps/**'
      - 'customization/overlays/**'
      - '.github/workflows/base-image-build.yml'
  workflow_dispatch:
    inputs:
      aio_version:
        description: Upstream AIO mastercontainer tag to pin on
        default: latest
        required: false

concurrency:
  group: base-image-build
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      DOCKER_ORG: sawyer-cloud
      AIO_VERSION: ${{ inputs.aio_version || 'latest' }}
      PUSH: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # build-base-image.sh reads git short-sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push aio-base
        run: bash scripts/build-base-image.sh

      - name: Summarize published tags
        run: |
          echo "Published tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${REGISTRY}/${DOCKER_ORG}/aio-base:$(git rev-parse --short HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "- \`${REGISTRY}/${DOCKER_ORG}/aio-base:latest\`" >> "$GITHUB_STEP_SUMMARY"
          fi
