# compose.yaml — sawyer-cloud top-level compose entry point.
#
# IMPORTANT: always invoke docker compose with BOTH the upstream file and
# our overlay:
#
#     docker compose \
#         -f compose.yaml \
#         -f customization/overlays/docker-compose.override.yaml \
#         up -d
#
# The scripts/deploy-staging.sh and scripts/packer/files/first-boot.sh
# runners already do this; direct `docker compose up` from the repo root
# will NOT pick up our customizations. `include:` was considered, but
# docker compose's include semantics do not cleanly override `image:` on
# shared service names — `-f` with two files uses the classic merge
# behavior that does (later file wins).
#
# Variables this file's merged form requires at compose-time:
#   CUSTOMER_NAME      — slug matching customization/customers/<n>/.
#   MGMT_SERVER_URL    — management-server endpoint the agent talks to.
#
# Optional:
#   CUSTOMER_FLAVOR    — default: default
#   AIO_IMAGE_TAG      — default: latest
#   DEPLOYMENT_MODE    — default: first-boot (first-boot | update | recover)
#   APACHE_PORT / APACHE_IP_BINDING — reverse-proxy wiring
#
# The caller is expected to have loaded flavor.env → customer.env →
# decrypted secrets into its shell before invoking compose; every service
# reads those values via ${VAR:-default} interpolation. See the overlay
# header for the full list of consumed vars.

name: sawyer-cloud

# The file below mirrors upstream's mastercontainer service definition so
# `docker compose up` from the repo root (without the overlay) still starts
# a runnable upstream AIO — useful as a staging smoke-compare baseline.
# The overlay, when applied via -f, replaces the image with our aio-base
# and adds the customer-agent sidecar.

include:
  - upstream/compose.yaml
