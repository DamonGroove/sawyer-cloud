# scripts/packer/files/90-customer.cfg
# Installed at /etc/cloud/cloud.cfg.d/90-customer.cfg in the Packer-baked VM.
#
# Tells cloud-init:
#   - Expect a NoCloud datasource (the customer provisioning system mounts
#     an ISO at /dev/sr1 with user-data + meta-data, OR passes them via
#     SMBIOS / kernel cmdline).
#   - Do NOT regenerate SSH host keys on every boot (they're baked at
#     Packer time and survive).
#   - Write the customer config files under /mnt/sawyer-config/ where
#     first-boot.sh picks them up.

datasource_list: [ NoCloud, ConfigDrive, None ]

datasource:
  NoCloud:
    # Where we expect the config drive or network-delivered user-data.
    fs_label: sawyer-cfg
    seedfrom: null

# Turn off the bits that fight with sawyer-cloud's first-boot.service.
cloud_init_modules:
  - migrator
  - seed_random
  - bootcmd
  - write_files
  - growpart
  - resizefs
  - disk_setup
  - mounts
  - set_hostname
  - update_hostname

cloud_config_modules:
  - ssh-import-id
  - locale
  - set_passwords
  - package_update_upgrade_install
  - timezone

cloud_final_modules:
  - scripts-vendor
  - scripts-per-once
  - scripts-per-boot
  - scripts-per-instance
  - scripts-user
  - ssh-authkey-fingerprints

# Where customer config files land. The hypervisor should deliver a
# tarball or ISO whose contents cloud-init extracts here.
write_files:
  - path: /etc/sawyer-cloud/README
    permissions: "0644"
    content: |
      This host is managed by sawyer-cloud. Customer configuration lives
      at /mnt/sawyer-config/ (delivered via cloud-init). Do not edit the
      running docker stack by hand — use `mgmt-ctl` against the management
      server instead.
